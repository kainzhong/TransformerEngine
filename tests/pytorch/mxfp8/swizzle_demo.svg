  <!-- ============================================================== -->
  <!-- Footer -->
  <!-- ============================================================== -->
  <text x="20" y="710" font-size="13" font-weight="bold" fill="#1f2937">In code:</text>
  <text x="20" y="730" font-family="monospace" font-size="11" fill="#374151">
    Replaces the manual gemm_swizzled_scale_idx() arithmetic with a tensor whose layout encodes the swizzle:
  </text>
  <text x="20" y="750" font-family="monospace" font-size="11" fill="#1d4ed8">
    mS_row = cute.make_tensor(scale_ptr,
  </text>
  <text x="20" y="768" font-family="monospace" font-size="11" fill="#1d4ed8">
    &#160;&#160;&#160;&#160;cute.make_layout(((G, M_tile/G, num_tiles_Y), (4, num_tiles_X)),
  </text>
  <text x="20" y="786" font-family="monospace" font-size="11" fill="#1d4ed8">
    &#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;stride=((16, 4, 512*num_tiles_X), (1, 512))))
  </text>
  <text x="20" y="804" font-family="monospace" font-size="11" fill="#374151">
    Then mS_row[i, j] = … just works — natural 2D access, no per-write index math.
  </text>
</svg>
