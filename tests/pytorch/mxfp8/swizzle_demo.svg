<svg viewBox="0 0 920 820" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="920" height="820" fill="#fafafa"/>

  <text x="20" y="32" font-size="20" font-weight="bold" fill="#1f2937">
    MXFP8 scale layout: compact vs gemm-swizzled, expressed as cute layouts
  </text>
  <text x="20" y="56" font-size="12" fill="#4b5563">
    Toy 8×4 tile, group size G=4. Real: 128×4 tile, G=32. Both layouts share the same hierarchical
  </text>
  <text x="20" y="74" font-size="12" fill="#4b5563">
    shape — only the row strides differ. Group A (yellow) = rows 0–3, Group B (blue) = rows 4–7.
  </text>

  <!-- ============================================================== -->
  <!-- 1. Logical view + Layout expressions -->
  <!-- ============================================================== -->
  <text x="20" y="116" font-size="14" font-weight="bold" fill="#1f2937">1. Logical scale tensor</text>

  <g transform="translate(80, 138)">
    <g font-family="monospace" font-size="10" text-anchor="middle" fill="#6b7280">
      <text x="14" y="-4">j=0</text><text x="42" y="-4">j=1</text>
      <text x="70" y="-4">j=2</text><text x="98" y="-4">j=3</text>
    </g>

    <rect x="0" y="0"   width="112" height="112" fill="#fde68a" stroke="#92400e" stroke-width="1.2"/>
    <rect x="0" y="112" width="112" height="112" fill="#bfdbfe" stroke="#1e40af" stroke-width="1.2"/>

    <g font-family="monospace" font-size="10" text-anchor="end" fill="#6b7280">
      <text x="-6" y="18">i=0</text><text x="-6" y="46">i=1</text>
      <text x="-6" y="74">i=2</text><text x="-6" y="102">i=3</text>
      <text x="-6" y="130">i=4</text><text x="-6" y="158">i=5</text>
      <text x="-6" y="186">i=6</text><text x="-6" y="214">i=7</text>
    </g>

    <g stroke="#374151" stroke-width="0.5">
      <line x1="28" y1="0" x2="28" y2="224"/><line x1="56" y1="0" x2="56" y2="224"/>
      <line x1="84" y1="0" x2="84" y2="224"/>
      <line x1="0" y1="28" x2="112" y2="28"/><line x1="0" y1="56" x2="112" y2="56"/>
      <line x1="0" y1="84" x2="112" y2="84"/><line x1="0" y1="140" x2="112" y2="140"/>
      <line x1="0" y1="168" x2="112" y2="168"/><line x1="0" y1="196" x2="112" y2="196"/>
    </g>

    <g font-family="monospace" font-size="9" text-anchor="middle" fill="#1f2937">
      <text x="14" y="18">s00</text><text x="42" y="18">s01</text><text x="70" y="18">s02</text><text x="98" y="18">s03</text>
      <text x="14" y="46">s10</text><text x="42" y="46">s11</text><text x="70" y="46">s12</text><text x="98" y="46">s13</text>
      <text x="14" y="74">s20</text><text x="42" y="74">s21</text><text x="70" y="74">s22</text><text x="98" y="74">s23</text>
      <text x="14" y="102">s30</text><text x="42" y="102">s31</text><text x="70" y="102">s32</text><text x="98" y="102">s33</text>
      <text x="14" y="130">s40</text><text x="42" y="130">s41</text><text x="70" y="130">s42</text><text x="98" y="130">s43</text>
      <text x="14" y="158">s50</text><text x="42" y="158">s51</text><text x="70" y="158">s52</text><text x="98" y="158">s53</text>
      <text x="14" y="186">s60</text><text x="42" y="186">s61</text><text x="70" y="186">s62</text><text x="98" y="186">s63</text>
      <text x="14" y="214">s70</text><text x="42" y="214">s71</text><text x="70" y="214">s72</text><text x="98" y="214">s73</text>
    </g>

    <text x="125" y="60" font-size="11" fill="#92400e" font-weight="bold">group A</text>
    <text x="125" y="180" font-size="11" fill="#1e40af" font-weight="bold">group B</text>
  </g>

  <!-- Layout expression panel, right of the grid -->
  <g transform="translate(280, 116)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#1f2937">As cute layouts</text>

    <text x="0" y="24" font-family="monospace" font-size="12" fill="#374151">
      Row decomposition (toy, G=4):  i = i_hi · 4 + i_lo
    </text>
    <text x="0" y="42" font-family="monospace" font-size="11" fill="#6b7280">
      i_lo ∈ {0,1,2,3}  (row within group)    i_hi ∈ {0,1}  (group index)
    </text>

    <!-- Compact layout box -->
    <rect x="0" y="60" width="610" height="80" fill="#fef3c7" stroke="#92400e" stroke-width="1"/>
    <text x="12" y="80" font-size="13" font-weight="bold" fill="#7c2d12">Compact (row-major)</text>
    <text x="12" y="106" font-family="monospace" font-size="13" fill="#1f2937">
      Layout  ((<tspan fill="#b45309" font-weight="bold">4</tspan>, <tspan fill="#b45309" font-weight="bold">2</tspan>), <tspan fill="#1d4ed8" font-weight="bold">4</tspan>) : ((<tspan fill="#b45309" font-weight="bold">4</tspan>, <tspan fill="#b45309" font-weight="bold">16</tspan>), <tspan fill="#1d4ed8" font-weight="bold">1</tspan>)
    </text>
    <text x="12" y="128" font-family="monospace" font-size="10" fill="#6b7280">
      shape  : ((i_lo, i_hi), j)        stride : (( 1·cols , 4·cols ), 1)
    </text>

    <!-- Swizzled layout box -->
    <rect x="0" y="156" width="610" height="80" fill="#dbeafe" stroke="#1e40af" stroke-width="1"/>
    <text x="12" y="176" font-size="13" font-weight="bold" fill="#1e3a8a">Swizzled (gemm-friendly)</text>
    <text x="12" y="202" font-family="monospace" font-size="13" fill="#1f2937">
      Layout  ((<tspan fill="#b45309" font-weight="bold">4</tspan>, <tspan fill="#b45309" font-weight="bold">2</tspan>), <tspan fill="#1d4ed8" font-weight="bold">4</tspan>) : ((<tspan fill="#b45309" font-weight="bold">8</tspan>, <tspan fill="#b45309" font-weight="bold">4</tspan>), <tspan fill="#1d4ed8" font-weight="bold">1</tspan>)
    </text>
    <text x="12" y="224" font-family="monospace" font-size="10" fill="#6b7280">
      shape  : ((i_lo, i_hi), j)        stride : (( 2·G   , G    ), 1)
    </text>

    <text x="0" y="262" font-family="monospace" font-size="11" fill="#374151">
      Same shape; only the (i_lo, i_hi) strides swap roles.
    </text>
    <text x="0" y="280" font-family="monospace" font-size="11" fill="#374151">
      Real (G=32):  swizzled stride = ((16, 4), 1).  Plus tile-major outer dims.
    </text>
  </g>

  <!-- ============================================================== -->
  <!-- 2. Compact byte stream -->
  <!-- ============================================================== -->
  <text x="20" y="430" font-size="14" font-weight="bold" fill="#1f2937">
    2. Compact byte stream — strides ((4, 16), 1)
  </text>
  <text x="20" y="448" font-family="monospace" font-size="11" fill="#6b7280">
    i_lo · 4 + i_hi · 16 + j  →  group A in bytes 0–15, group B in bytes 16–31.
  </text>

