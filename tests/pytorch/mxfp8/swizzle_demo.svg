  </g>

  <!-- ============================================================== -->
  <!-- 3. Swizzled byte stream -->
  <!-- ============================================================== -->
  <text x="20" y="570" font-size="14" font-weight="bold" fill="#1f2937">
    3. Swizzled byte stream — strides ((8, 4), 1)
  </text>
  <text x="20" y="588" font-family="monospace" font-size="11" fill="#6b7280">
    i_lo · 8 + i_hi · 4 + j  →  groups A and B interleave every 4 bytes (every i_hi step).
  </text>

